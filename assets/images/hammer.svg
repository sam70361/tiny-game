<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges" aria-hidden="true">
  <!--
    Carnival mallet — 1-bit ink with paper accents
    Head upper-left, handle lower-right
  -->
  <g fill="#0a0a0a">
    <!-- head crown -->
    <rect x="8" y="2" width="20" height="2"/>
    <rect x="5" y="4" width="26" height="2"/>
    <rect x="3" y="6" width="30" height="3"/>
    <!-- head body -->
    <rect x="2" y="9" width="32" height="5"/>
    <rect x="3" y="14" width="30" height="4"/>
    <rect x="5" y="18" width="26" height="3"/>
    <rect x="8" y="21" width="20" height="2"/>

    <!-- paper face panels (depth) -->
    <rect x="6" y="8" width="5" height="3" fill="#f5f5f0"/>
    <rect x="25" y="8" width="5" height="3" fill="#f5f5f0"/>
    <rect x="12" y="11" width="12" height="2" fill="#f5f5f0"/>

    <!-- metal ferrule -->
    <rect x="14" y="23" width="8" height="2"/>
    <rect x="15" y="25" width="6" height="2" fill="#f5f5f0"/>
    <rect x="14" y="27" width="8" height="2"/>

    <!-- handle shaft -->
    <rect x="16" y="29" width="4" height="3"/>
    <rect x="17" y="32" width="4" height="3"/>
    <rect x="18" y="35" width="4" height="3"/>
    <rect x="19" y="38" width="4" height="3"/>
    <rect x="20" y="41" width="5" height="2"/>

    <!-- grip wrap -->
    <rect x="21" y="43" width="6" height="2" fill="#f5f5f0"/>
    <rect x="22" y="45" width="7" height="2"/>

    <!-- impact sparks -->
    <rect x="0" y="5" width="2" height="2"/>
    <rect x="35" y="4" width="2" height="2"/>
    <rect x="1" y="16" width="1" height="1"/>
    <rect x="36" y="14" width="2" height="2"/>
    <rect x="34" y="20" width="1" height="1"/>
  </g>
</svg>
